<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>10 bento bands — momentum revive demo</title>
  <link rel="stylesheet" href="/css/brutalist.css">
  <link rel="stylesheet" href="demo-timeline.css">
  <style>
    body { margin: 0; }
    .hub { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; text-transform: lowercase; padding: 20px clamp(16px,3vw,32px); max-width: 1000px; margin: 0 auto; }
    .hub a { color: var(--dark); }
    .band { padding: clamp(40px,6vw,72px) clamp(16px,3vw,32px); border-bottom: 4px solid var(--dark); }
    .band:nth-child(even) { background: #fffef5; }
    .band:nth-child(odd) { background: var(--white); }
    .inner { max-width: 1000px; margin: 0 auto; }
    .band-h { display: flex; flex-wrap: wrap; gap: 12px 24px; align-items: baseline; margin-bottom: 24px; }
    .band-h .n { font-family: var(--font-mono); font-size: 12px; font-weight: 700; background: var(--yel); border: 2px solid var(--dark); padding: 4px 12px; border-radius: 999px; }
    .band-h h2 { margin: 0; flex: 1; font-size: clamp(22px,4vw,32px); text-transform: lowercase; min-width: 200px; }
    .band-h .range { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); text-transform: lowercase; }
    .bento { display: grid; grid-template-columns: 1.4fr 1fr; grid-template-rows: auto auto; gap: 14px; }
    @media (max-width: 800px) { .bento { grid-template-columns: 1fr; } }
    .cell { border: 2px solid var(--dark); border-radius: var(--radius-card-lg); padding: 20px; background: var(--white); }
    .cell.events { grid-column: 1; grid-row: 1 / span 2; }
    @media (max-width: 800px) { .cell.events { grid-column: 1; grid-row: auto; } }
    .cell.tape-a { grid-column: 2; grid-row: 1; }
    .cell.tape-b { grid-column: 2; grid-row: 2; }
    @media (max-width: 800px) { .cell.tape-a, .cell.tape-b { grid-column: 1; grid-row: auto; } }
    .events ul { margin: 0; padding: 0; list-style: none; }
    .events li { font-family: var(--font-primary); font-size: 16px; line-height: 1.65; text-transform: lowercase; padding: 14px 0; border-top: 1px solid rgba(0,0,0,.08); }
    .events li:first-child { border-top: none; padding-top: 0; }
    .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .05em; color: var(--muted); margin-right: 8px; }
    .mini { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: lowercase; color: var(--muted); margin: 0 0 12px; }
    .mini-t { background: var(--dark); color: var(--white); }
    .mini-t .mini { color: rgba(255,255,255,.5); }
    .mini-t p { font-family: var(--font-primary); font-size: 16px; line-height: 1.6; margin: 0 0 12px; text-transform: lowercase; }
    .mini-t p:last-child { margin-bottom: 0; }
    .mini-t b { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .06em; color: var(--yel); display: block; margin-bottom: 6px; }
    .intro-band { padding: 32px clamp(16px,3vw,32px) 48px; border-bottom: 4px solid var(--dark); }
    .intro-band .inner { max-width: 1000px; margin: 0 auto; }
    .intro-band h1 { font-size: clamp(32px,6vw,56px); text-transform: lowercase; margin: 0 0 12px; letter-spacing: -.05em; }
    .intro-band p { font-family: var(--font-primary); font-size: clamp(16px, 1.8vw, 18px); font-weight: 500; color: var(--text2); text-transform: lowercase; max-width: 44ch; line-height: 1.6; margin: 0; }
  </style>
</head>
<body>
  <p class="hub"><a href="index.html">← all layouts</a></p>
  <div class="intro-band">
    <div class="inner">
      <h1 id="hero-title"></h1>
      <p id="hero-deck"></p>
      <div id="demo-timeline-mount" class="demo-timeline-mount" data-variant="bento-meter"></div>
    </div>
  </div>
  <div id="root"></div>
  <script src="data.js"></script>
  <script src="demo-timeline.js"></script>
  <script>
(function () {
  var R = window.MR_DEMO_DATA;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  document.getElementById('hero-title').textContent = R.displayName + ' · bento bands';
  document.getElementById('hero-deck').textContent = R.windowLabel + ' — full-bleed alternating bands; events span wide, tape in a 2-cell bento.';
  var html = '';
  R.chapters.forEach(function (ch, i) {
    var ev = ch.events.map(function (e) {
      return '<li><span class="tag">' + esc(e.tag) + '</span>' + esc(e.text) + '</li>';
    }).join('');
    var t1 = ch.tape ? '<p><b>stock</b>' + esc(ch.tape.stock) + '</p>' : '';
    var t2 = ch.tape ? '<p><b>indices</b>' + esc(ch.tape.index) + '</p><p><b>relative</b>' + esc(ch.tape.rel) + '</p>' : '';
    html += '<section class="band" id="ch-' + (i + 1) + '"><div class="inner"><div class="band-h">' +
      '<span class="n">' + String(i + 1).padStart(2, '0') + '</span><h2>' + esc(ch.title) + '</h2><span class="range">' + esc(ch.range) + '</span></div>' +
      '<div class="bento">' +
      '<div class="cell events"><ul>' + ev + '</ul></div>' +
      '<div class="cell mini-t tape-a"><p class="mini">tape</p>' + t1 + '</div>' +
      '<div class="cell mini-t tape-b">' + t2 + '</div>' +
      '</div></div></section>';
  });
  document.getElementById('root').innerHTML = html;
  window.initDemoTimeline();
})();
  </script>
</body>
</html>
