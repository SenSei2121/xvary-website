<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>07 zigzag — momentum revive demo</title>
  <link rel="stylesheet" href="/css/brutalist.css">
  <link rel="stylesheet" href="demo-timeline.css">
  <style>
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px clamp(16px,3vw,32px) 80px; }
    .hub { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; text-transform: lowercase; margin-bottom: 24px; }
    .hub a { color: var(--dark); }
    h1 { font-size: clamp(28px,5vw,44px); text-transform: lowercase; margin: 0 0 12px; }
    .deck { font-family: var(--font-primary); font-size: clamp(16px, 1.8vw, 18px); font-weight: 500; color: var(--text2); text-transform: lowercase; max-width: 44ch; line-height: 1.6; margin-bottom: 40px; }
    .zig { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; align-items: start; margin-bottom: 36px; }
    @media (max-width: 720px) { .zig { grid-template-columns: 1fr; } }
    .zig.rev .a { order: 2; }
    .zig.rev .b { order: 1; }
    @media (max-width: 720px) { .zig.rev .a, .zig.rev .b { order: unset; } }
    .caps { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); padding-bottom: 8px; border-bottom: 2px solid var(--dark); text-transform: lowercase; }
    .caps strong { font-family: var(--font-primary); color: var(--dark); font-size: clamp(15px, 1.5vw, 17px); display: block; margin-bottom: 6px; font-weight: 700; letter-spacing: -.02em; }
    .panel { border: 2px solid var(--dark); border-radius: var(--radius-card-lg); padding: 20px; background: var(--white); }
    .panel.dark { background: var(--dark); color: var(--white); box-shadow: 6px 6px 0 var(--yel); }
    .panel h3 { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: lowercase; margin: 0 0 14px; color: var(--muted); }
    .panel.dark h3 { color: rgba(255,255,255,.5); }
    ul { margin: 0; padding: 0; list-style: none; }
    li { font-family: var(--font-primary); font-size: 16px; line-height: 1.65; text-transform: lowercase; padding: 12px 0; border-top: 1px solid rgba(0,0,0,.08); }
    .panel.dark li { border-color: rgba(255,255,255,.1); }
    li:first-child { border-top: none; padding-top: 0; }
    .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .05em; color: var(--muted); margin-right: 8px; }
    .panel.dark .tag { color: rgba(255,255,255,.45); }
    .tape p { font-family: var(--font-primary); font-size: 16px; line-height: 1.6; margin: 0 0 12px; text-transform: lowercase; }
    .tape b { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .06em; display: block; color: rgba(255,255,255,.5); margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="hub"><a href="index.html">← all layouts</a></p>
    <h1 id="hero-title"></h1>
    <p class="deck" id="hero-deck"></p>
    <div id="demo-timeline-mount" class="demo-timeline-mount" data-variant="zigzag-spine"></div>
    <div id="root"></div>
  </div>
  <script src="data.js"></script>
  <script src="demo-timeline.js"></script>
  <script>
(function () {
  var R = window.MR_DEMO_DATA;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  document.getElementById('hero-title').textContent = R.displayName + ' · zigzag';
  document.getElementById('hero-deck').textContent = R.windowLabel + ' — odd chapters: events left / tape right. even chapters: flipped.';
  var html = '';
  R.chapters.forEach(function (ch, i) {
    var ev = ch.events.map(function (e) {
      return '<li><span class="tag">' + esc(e.tag) + '</span>' + esc(e.text) + '</li>';
    }).join('');
    var tp = '';
    if (ch.tape) {
      tp = '<p><b>stock</b>' + esc(ch.tape.stock) + '</p><p><b>indices</b>' + esc(ch.tape.index) + '</p><p><b>relative</b>' + esc(ch.tape.rel) + '</p>';
    }
    var rev = i % 2 === 1 ? ' rev' : '';
    html += '<section class="zig' + rev + '" id="ch-' + (i + 1) + '"><div class="caps"><strong>' + esc(ch.title) + '</strong>chapter ' + (i + 1) + ' · ' + esc(ch.range) + '</div>' +
      '<div class="panel a"><h3>what was moving</h3><ul>' + ev + '</ul></div>' +
      '<div class="panel dark b tape"><h3>tape</h3>' + tp + '</div></section>';
  });
  document.getElementById('root').innerHTML = html;
  window.initDemoTimeline();
})();
  </script>
</body>
</html>
