<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>02 magazine split — momentum revive demo</title>
  <link rel="stylesheet" href="/css/brutalist.css?v=1776081807">
  <link rel="stylesheet" href="demo-timeline.css?v=1776081807">
  <style>
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px clamp(16px,3vw,32px) 80px; }
    .hub { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; text-transform: lowercase; margin-bottom: 24px; }
    .hub a { color: var(--dark); }
    h1 { font-size: clamp(36px,7vw,64px); text-transform: lowercase; letter-spacing: -.06em; margin: 0 0 16px; max-width: 10ch; line-height: .95; }
    .deck { font-family: var(--font-primary); font-size: clamp(17px, 1.9vw, 20px); font-weight: 500; color: var(--text2); text-transform: lowercase; max-width: 40ch; line-height: 1.6; margin-bottom: 48px; }
    .row { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: clamp(20px,4vw,40px); align-items: start; margin-bottom: 48px; padding-bottom: 48px; border-bottom: 4px solid var(--dark); }
    @media (max-width: 860px) { .row { grid-template-columns: 1fr; } }
    .events h2 { font-size: clamp(20px,3vw,28px); text-transform: lowercase; margin: 0 0 8px; }
    .events .range { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); margin-bottom: 20px; text-transform: lowercase; }
    .events ul { margin: 0; padding: 0; list-style: none; }
    .events li { font-family: var(--font-primary); font-size: 16px; line-height: 1.65; text-transform: lowercase; padding: 14px 0; border-top: 1px solid rgba(0,0,0,.1); }
    .events li:first-child { border-top: none; }
    .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .05em; color: var(--muted); margin-right: 8px; }
    .tape-wrap { position: sticky; top: 108px; }
    .tape { background: var(--dark); color: var(--white); padding: 24px; border-radius: var(--radius-card-lg); border: 2px solid var(--dark); box-shadow: 8px 8px 0 var(--yel); }
    .tape h3 { font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em; text-transform: lowercase; color: rgba(255,255,255,.55); margin: 0 0 16px; font-weight: 600; }
    .tape p { font-family: var(--font-primary); font-size: 16px; line-height: 1.6; text-transform: lowercase; margin: 0 0 14px; }
    .tape p:last-child { margin-bottom: 0; }
    .tape b { font-family: var(--font-mono); font-size: 12px; letter-spacing: .06em; display: block; color: rgba(255,255,255,.5); margin-bottom: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="hub"><a href="index.html">← all layouts</a></p>
    <h1 id="hero-title"></h1>
    <p class="deck" id="hero-deck"></p>
    <div id="demo-timeline-mount" class="demo-timeline-mount" data-variant="magazine-rail"></div>
    <div id="root"></div>
  </div>
  <script src="data.js?v=1776081807"></script>
  <script src="demo-timeline.js?v=1776081807"></script>
  <script>
(function () {
  var R = window.MR_DEMO_DATA;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  document.getElementById('hero-title').textContent = R.displayName;
  document.getElementById('hero-deck').textContent = R.windowLabel + ' — wide narrative column + sticky tape rail (magazine split).';
  var html = '';
  R.chapters.forEach(function (ch, i) {
    var ev = ch.events.map(function (e) {
      return '<li><span class="tag">' + esc(e.tag) + '</span>' + esc(e.text) + '</li>';
    }).join('');
    var tp = '';
    if (ch.tape) {
      tp = '<p><b>stock</b>' + esc(ch.tape.stock) + '</p><p><b>indices</b>' + esc(ch.tape.index) + '</p><p><b>relative</b>' + esc(ch.tape.rel) + '</p>';
    }
    html += '<section class="row" id="ch-' + (i + 1) + '"><div class="events"><h2>' + esc(ch.title) + '</h2>' +
      '<div class="range">chapter ' + (i + 1) + ' · ' + esc(ch.range) + '</div><ul>' + ev + '</ul></div>' +
      '<div class="tape-wrap"><div class="tape"><h3>tape &amp; cross-asset</h3>' + tp + '</div></div></section>';
  });
  document.getElementById('root').innerHTML = html;
  window.initDemoTimeline();
})();
  </script>
</body>
</html>
