<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>06 horizontal snap — momentum revive demo</title>
  <link rel="stylesheet" href="/css/brutalist.css">
  <link rel="stylesheet" href="demo-timeline.css">
  <style>
    body { margin: 0; overflow-x: hidden; }
    .hub { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; text-transform: lowercase; padding: 16px clamp(16px,3vw,32px) 8px; max-width: 1100px; margin: 0 auto; }
    .hub a { color: var(--dark); }
    .intro { padding: 8px clamp(16px,3vw,32px) 20px; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: clamp(26px,5vw,40px); text-transform: lowercase; margin: 0 0 8px; }
    .sub { font-family: var(--font-primary); color: var(--text2); text-transform: lowercase; max-width: 44ch; font-size: clamp(16px, 1.8vw, 18px); font-weight: 500; line-height: 1.6; margin: 0; }
    .strip { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 0; padding: 0 0 32px; border-top: 4px solid var(--dark); border-bottom: 4px solid var(--dark); -webkit-overflow-scrolling: touch; }
    .slide { flex: 0 0 min(92vw, 520px); scroll-snap-align: start; min-height: 70vh; padding: 28px clamp(20px,4vw,36px); border-right: 2px solid var(--dark); box-sizing: border-box; display: flex; flex-direction: column; }
    .slide:nth-child(odd) { background: var(--white); }
    .slide:nth-child(even) { background: #fafaf8; }
    .slide-h { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); margin-bottom: 10px; text-transform: lowercase; }
    .slide h2 { font-size: clamp(20px,4vw,26px); text-transform: lowercase; margin: 0 0 20px; line-height: 1.15; }
    .slide-body { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    ul { margin: 0; padding: 0; list-style: none; }
    li { font-family: var(--font-primary); font-size: 16px; line-height: 1.65; text-transform: lowercase; padding: 12px 0; border-top: 1px solid rgba(0,0,0,.08); }
    li:first-child { border-top: none; padding-top: 0; }
    .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .05em; color: var(--muted); margin-right: 8px; }
    .tape { background: var(--dark); color: var(--white); padding: 16px; border-radius: var(--radius-card); margin-top: auto; }
    .tape h3 { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .1em; color: rgba(255,255,255,.55); margin: 0 0 12px; text-transform: lowercase; }
    .tape p { font-family: var(--font-primary); font-size: 15px; line-height: 1.6; margin: 0 0 10px; text-transform: lowercase; }
    .tape b { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .06em; color: rgba(255,255,255,.5); display: block; margin-bottom: 4px; }
    .hint { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); text-align: center; padding: 14px; text-transform: lowercase; line-height: 1.5; }
  </style>
</head>
<body>
  <p class="hub"><a href="index.html">← all layouts</a></p>
  <div class="intro">
    <h1 id="hero-title"></h1>
    <p class="sub" id="hero-sub"></p>
  </div>
  <div style="max-width:1100px;margin:0 auto;padding:0 clamp(16px,3vw,32px)"><div id="demo-timeline-mount" class="demo-timeline-mount" data-variant="filmstrip"></div></div>
  <p class="hint">scroll sideways · each chapter is one snap panel · timeline above jumps along the strip</p>
  <div class="strip" id="root" role="region" aria-label="chapter carousel"></div>
  <script src="data.js"></script>
  <script src="demo-timeline.js"></script>
  <script>
(function () {
  var R = window.MR_DEMO_DATA;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  document.getElementById('hero-title').textContent = R.displayName + ' · horizontal snap';
  document.getElementById('hero-sub').textContent = R.windowLabel;
  var html = '';
  R.chapters.forEach(function (ch, i) {
    var ev = ch.events.map(function (e) {
      return '<li><span class="tag">' + esc(e.tag) + '</span>' + esc(e.text) + '</li>';
    }).join('');
    var tp = '';
    if (ch.tape) {
      tp = '<p><b>stock</b>' + esc(ch.tape.stock) + '</p><p><b>indices</b>' + esc(ch.tape.index) + '</p><p><b>relative</b>' + esc(ch.tape.rel) + '</p>';
    }
    html += '<article class="slide" id="ch-' + (i + 1) + '"><div class="slide-h">chapter ' + (i + 1) + ' · ' + esc(ch.range) + '</div><h2>' + esc(ch.title) + '</h2>' +
      '<div class="slide-body"><ul>' + ev + '</ul><div class="tape"><h3>tape</h3>' + tp + '</div></div></article>';
  });
  document.getElementById('root').innerHTML = html;
  window.initDemoTimeline();
})();
  </script>
</body>
</html>
