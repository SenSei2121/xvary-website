<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>01 rail spine — momentum revive demo</title>
  <link rel="stylesheet" href="/css/brutalist.css?v=1776081807">
  <link rel="stylesheet" href="demo-timeline.css?v=1776081807">
  <style>
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px clamp(16px,3vw,32px) 80px; }
    .hub { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; text-transform: lowercase; margin-bottom: 24px; }
    .hub a { color: var(--dark); }
    h1 { font-size: clamp(32px,6vw,52px); text-transform: lowercase; letter-spacing: -.05em; margin: 0 0 12px; }
    .sub { font-family: var(--font-primary); font-size: clamp(16px, 1.8vw, 18px); color: var(--text2); text-transform: lowercase; max-width: 40ch; line-height: 1.6; font-weight: 500; }
    .tl { position: relative; margin-top: 40px; padding-left: 44px; }
    .tl::before { content: ''; position: absolute; left: 17px; top: 0; bottom: 0; width: 3px; background: var(--dark); border-radius: 2px; }
    .node { position: relative; margin-bottom: 40px; }
    .dot { position: absolute; left: -36px; top: 6px; width: 16px; height: 16px; background: var(--yel); border: 3px solid var(--dark); border-radius: 50%; }
    .head { border-bottom: 3px solid var(--dark); padding-bottom: 12px; margin-bottom: 16px; }
    .head h2 { margin: 0 0 4px; font-size: clamp(18px,3vw,24px); text-transform: lowercase; }
    .meta { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); text-transform: lowercase; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    .panel { border: 2px solid var(--dark); border-radius: var(--radius-card-lg); padding: 18px; background: var(--white); box-shadow: 5px 5px 0 rgba(0,0,0,.08); }
    .panel h3 { font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em; text-transform: lowercase; color: var(--muted); margin: 0 0 14px; font-weight: 600; }
    .panel.dark { background: var(--dark); color: var(--white); box-shadow: 5px 5px 0 var(--yel); }
    .panel.dark h3 { color: rgba(255,255,255,.5); }
    ul { margin: 0; padding: 0; list-style: none; }
    li { font-family: var(--font-primary); font-size: 16px; line-height: 1.65; text-transform: lowercase; padding: 10px 0; border-top: 1px solid rgba(0,0,0,.08); }
    .panel.dark li { border-color: rgba(255,255,255,.12); }
    li:first-child { border-top: none; padding-top: 0; }
    .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .05em; color: var(--muted); margin-right: 8px; }
    .panel.dark .tag { color: rgba(255,255,255,.45); }
    .stat { margin-bottom: 14px; font-size: 16px; line-height: 1.6; text-transform: lowercase; }
    .stat b { font-family: var(--font-mono); font-size: 12px; display: block; color: var(--muted); font-weight: 600; margin-bottom: 6px; letter-spacing: .06em; }
    .panel.dark .stat b { color: rgba(255,255,255,.45); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="hub"><a href="index.html">← all layouts</a></p>
    <h1 id="hero-title">momentum revive</h1>
    <p class="sub" id="hero-sub"></p>
    <div id="demo-timeline-mount" class="demo-timeline-mount" data-variant="rail-spine"></div>
    <div class="tl" id="root"></div>
  </div>
  <script src="data.js?v=1776081807"></script>
  <script src="demo-timeline.js?v=1776081807"></script>
  <script>
(function () {
  var R = window.MR_DEMO_DATA;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  document.getElementById('hero-title').textContent = R.displayName + ' · rail spine';
  document.getElementById('hero-sub').textContent = R.windowLabel + ' — vertical spine + dots, two panels per chapter.';
  var html = '';
  R.chapters.forEach(function (ch, i) {
    var ev = ch.events.map(function (e) {
      return '<li><span class="tag">' + esc(e.tag) + '</span>' + esc(e.text) + '</li>';
    }).join('');
    var tp = '';
    if (ch.tape) {
      tp = '<div class="stat"><b>stock</b>' + esc(ch.tape.stock) + '</div>' +
        '<div class="stat"><b>indices / peers</b>' + esc(ch.tape.index) + '</div>' +
        '<div class="stat"><b>relative</b>' + esc(ch.tape.rel) + '</div>';
    }
    html += '<article class="node" id="ch-' + (i + 1) + '"><div class="dot" aria-hidden="true"></div><div class="head">' +
      '<h2>' + esc(ch.title) + '</h2><div class="meta">chapter ' + (i + 1) + ' · ' + esc(ch.range) + '</div></div>' +
      '<div class="grid"><div class="panel"><h3>what was moving</h3><ul>' + ev + '</ul></div>' +
      '<div class="panel dark"><h3>tape</h3>' + tp + '</div></div></article>';
  });
  document.getElementById('root').innerHTML = html;
  window.initDemoTimeline();
})();
  </script>
</body>
</html>
