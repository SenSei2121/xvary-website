<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>03 card stack — momentum revive demo</title>
  <link rel="stylesheet" href="/css/brutalist.css?v=1776081807">
  <link rel="stylesheet" href="demo-timeline.css?v=1776081807">
  <style>
    body { background: #f4f4f2; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 24px clamp(16px,3vw,32px) 80px; }
    .hub { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; text-transform: lowercase; margin-bottom: 24px; }
    .hub a { color: var(--dark); }
    h1 { font-size: clamp(28px,5vw,40px); text-transform: lowercase; margin: 0 0 8px; }
    .deck { font-family: var(--font-primary); font-size: clamp(16px, 1.8vw, 18px); font-weight: 500; color: var(--text2); line-height: 1.6; text-transform: lowercase; margin-bottom: 32px; max-width: 42ch; }
    .card { background: var(--white); border: 2px solid var(--dark); border-radius: var(--radius-card-lg); padding: 24px 24px 28px; margin-bottom: 20px; box-shadow: 6px 6px 0 rgba(0,0,0,.12); }
    .card-top { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid var(--dark); }
    .card-top h2 { margin: 0; font-size: 20px; text-transform: lowercase; flex: 1; min-width: 200px; }
    .num { font-family: var(--font-mono); font-size: 13px; font-weight: 600; background: var(--yel); padding: 6px 12px; border-radius: 999px; border: 2px solid var(--dark); }
    .range { font-family: var(--font-mono); font-size: 13px; letter-spacing: .04em; color: var(--muted); text-transform: lowercase; }
    .inner { display: grid; gap: 20px; }
    @media (min-width: 640px) { .inner { grid-template-columns: 1fr 1fr; } }
    .blk h3 { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: lowercase; color: var(--muted); margin: 0 0 12px; }
    .blk ul { margin: 0; padding: 0; list-style: none; }
    .blk li { font-family: var(--font-primary); font-size: 16px; line-height: 1.65; text-transform: lowercase; padding: 12px 0; border-top: 1px solid rgba(0,0,0,.08); }
    .blk li:first-child { border-top: none; padding-top: 0; }
    .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .05em; color: var(--muted); margin-right: 8px; }
    .tape { background: var(--dark); color: var(--white); padding: 16px; border-radius: var(--radius-card); }
    .tape h3 { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .1em; color: rgba(255,255,255,.55); margin: 0 0 12px; text-transform: lowercase; }
    .tape p { font-family: var(--font-primary); font-size: 16px; line-height: 1.6; margin: 0 0 12px; text-transform: lowercase; }
    .tape p:last-child { margin-bottom: 0; }
    .tape b { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: .06em; display: block; color: rgba(255,255,255,.55); margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="hub"><a href="index.html">← all layouts</a></p>
    <h1 id="hero-title"></h1>
    <p class="deck" id="hero-deck"></p>
    <div id="demo-timeline-mount" class="demo-timeline-mount" data-variant="card-calendar"></div>
    <div id="root"></div>
  </div>
  <script src="data.js?v=1776081807"></script>
  <script src="demo-timeline.js?v=1776081807"></script>
  <script>
(function () {
  var R = window.MR_DEMO_DATA;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  document.getElementById('hero-title').textContent = R.displayName + ' · card stack';
  document.getElementById('hero-deck').textContent = R.windowLabel + ' — stacked cards, soft page tint.';
  var html = '';
  R.chapters.forEach(function (ch, i) {
    var ev = ch.events.map(function (e) {
      return '<li><span class="tag">' + esc(e.tag) + '</span>' + esc(e.text) + '</li>';
    }).join('');
    var tp = '';
    if (ch.tape) {
      tp = '<p><b>stock</b>' + esc(ch.tape.stock) + '</p><p><b>indices</b>' + esc(ch.tape.index) + '</p><p><b>relative</b>' + esc(ch.tape.rel) + '</p>';
    }
    html += '<article class="card" id="ch-' + (i + 1) + '"><div class="card-top"><h2>' + esc(ch.title) + '</h2>' +
      '<span class="num">' + String(i + 1).padStart(2, '0') + '</span><span class="range">' + esc(ch.range) + '</span></div>' +
      '<div class="inner"><div class="blk"><h3>what was moving</h3><ul>' + ev + '</ul></div>' +
      '<div class="blk tape"><h3>tape</h3>' + tp + '</div></div></article>';
  });
  document.getElementById('root').innerHTML = html;
  window.initDemoTimeline();
})();
  </script>
</body>
</html>
